name: Software Development
stages:
  - name: Design
    executor: agent
    config:
      skill: brainstorming
      description: Explore requirements and produce a design spec
    exit_conditions:
      required_artifacts: [design-spec]
      human_approval: true
    document: docs/stages/design.md

  - name: Implement
    executor: agent
    config:
      skill: executing-plans
      description: Execute the implementation plan
    exit_conditions:
      required_artifacts: [implementation-commit]
      human_approval: false
    document: docs/stages/implement.md

  - name: Test
    executor: agent
    config:
      skill: running-tests
      description: Run all test suites across all services
    exit_conditions:
      required_artifacts: [test-report]
      human_approval: false
    document: docs/stages/test.md

  - name: Review
    executor: agent
    config:
      skill: code-review
      description: Review implementation against spec and coding standards
    exit_conditions:
      required_artifacts: [review-report]
      human_approval: true
    document: docs/stages/review.md

  - name: Release
    executor: human
    config:
      description: Merge PR, verify deployment
    exit_conditions:
      required_artifacts: [release-url]
      human_approval: true
    document: docs/stages/release.md
