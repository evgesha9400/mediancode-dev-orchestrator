name: Software Development

stages:
  - name: Plan
    exit_conditions:
      required_artifacts: [implementation-plan, plan-review-report]
      human_approval: true
    steps:
      - name: Write Plans
        agent:
          frontend: svelte-architect
          backend: senior-code-architect-PY
        skill: writing-plans
        parallel: true

      - name: Plan Review
        agent: code-reviewer
        skill: plan-review
        loop_back_to: Write Plans

  - name: Implement
    exit_conditions:
      required_artifacts: [implementation-commit, review-report]
      human_approval: true
    steps:
      - name: Code
        agent:
          frontend: svelte-architect
          backend: senior-code-architect-PY
        skill: executing-plans
        parallel: true

      - name: Code Review
        agent: code-reviewer
        skill: requesting-code-review
        loop_back_to: Code
